<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lumina Control - Entre em contato com nossa equipe">
    <title>Lumina Control | Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="premium-page" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=2064');">
    <nav class="site-nav" style="position: absolute; top: 30px; z-index: 10;">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Cliente</a></li>
            <li><a href="agendamento.html">Agendamento</a></li>
            <li><a href="contato.html" class="active">Contato</a></li>
        </ul>
    </nav>

    <div class="premium-card">
        <div class="premium-header">
            <h2>Vamos conversar?</h2>
            <p>Deixe sua mensagem e nossa equipe retornará em tempo recorde.</p>
        </div>

        <form id="form-contato" class="minimal-form">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Como devemos te chamar?" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail Corporativo</label>
                <input type="email" id="email" name="email" placeholder="seu@empresa.com" required>
            </div>

            <div class="form-group">
                <label for="assunto">Assunto</label>
                <input type="text" id="assunto" name="assunto" placeholder="Sobre o que deseja falar?" required>
            </div>

            <div class="form-group">
                <label for="mensagem-texto">Sua Mensagem</label>
                <textarea id="mensagem-texto" name="mensagem" rows="3" placeholder="Conte-nos um pouco mais..." required></textarea>
            </div>

            <button type="submit" class="btn-minimal">Enviar Agora</button>
        </form>

        <div id="contato-status" class="status-msg"></div>
    </div>
</div>

<script>
    document.getElementById('form-contato').addEventListener('submit', function(e) {
        e.preventDefault();
        const msg = document.getElementById('contato-status');
        msg.textContent = '✅ Mensagem enviada com sucesso! Retornaremos em breve.';
        msg.className = 'status-msg show success';
        this.reset();
        setTimeout(() => { msg.className = 'status-msg'; }, 5000);
    });
</script>
</body>
</html>
