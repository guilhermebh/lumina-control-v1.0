<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lumina Control - Autenticação de Sistema">
    <title>Lumina Control | Autenticação</title>
    <!-- Importação do Estilo Base -->
    <link rel="stylesheet" href="index.css">
    
    <style>
        /* --- Abas de Navegação entre Fluxos de Autenticação --- */
        .auth-tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }
        .auth-tab {
            padding: 12px 0;
            color: var(--text-muted);
            cursor: pointer;
            font-size: var(--fs-sm);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }
        .auth-tab.active {
            color: var(--primary);
            border-color: var(--primary);
        }
        
        /* --- Controle de Exibição das Seções --- */
        .auth-section {
            display: none;
        }
        .auth-section.active {
            display: block;
        }
        
        /* --- Links de Rodapé da Autenticação --- */
        .auth-footer-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
            text-align: center;
        }
        .auth-footer-links a {
            font-size: var(--fs-xs);
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
        }
        .auth-footer-links a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body class="login-wrapper">

<!-- Link de acessibilidade para pular direto para o formulário -->
<a href="#login-section" class="skip-link">Pular para o login</a>

<!-- Efeitos Visuais de Fundo -->
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- Caixa de Autenticação Centralizada -->
<div class="login-box reveal visible" style="max-width: 450px;">
    <header class="login-header">
        <!-- Logotipo com Link para Home -->
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 24px;" aria-label="Voltar para Home">
            ◈ LUMINA<span>CONTROL</span>
        </a>
        
        <!-- Menu de Troca entre Login, Cadastro e Solicitação -->
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuth('login')">Entrar</div>
            <div class="auth-tab" onclick="switchAuth('register')">Cadastrar</div>
            <div class="auth-tab" onclick="switchAuth('request')">Solicitar</div>
        </div>
    </header>

    <!-- ─── FLUXO 1: Login de Usuário Existente ─── -->
    <div id="login-section" class="auth-section active">
        <form id="login-form" aria-label="Formulário de Login">
            <div class="form-group">
                <label for="email-login">E-mail Corporativo</label>
                <div class="input-wrapper">
                    <!-- Ícone SVG de E-mail -->
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" id="email-login" name="email" placeholder="seu@empresa.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="senha-login">Senha de Acesso</label>
                <div class="input-wrapper">
                    <!-- Ícone SVG de Tranca -->
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="senha-login" name="senha" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <span>Acessar Terminal</span>
            </button>
        </form>
        <div class="auth-footer-links">
            <a href="#" onclick="switchAuth('recover')">Esqueceu sua senha?</a>
        </div>
    </div>

    <!-- ─── FLUXO 2: Cadastro de Novo Usuário (Auto-serviço) ─── -->
    <div id="register-section" class="auth-section">
        <form id="register-form" aria-label="Formulário de Cadastro">
            <div class="form-group">
                <label for="nome-reg">Nome Completo</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="nome-reg" name="nome" placeholder="Nome completo" required>
                </div>
            </div>
            <div class="form-group">
                <label for="email-reg">E-mail Corporativo</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" id="email-reg" name="email" placeholder="seu@empresa.com" required>
                </div>
            </div>
            <div class="form-group">
                <label for="senha-reg">Nova Senha</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="senha-reg" name="senha" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <span>Criar Conta</span>
            </button>
        </form>
    </div>

    <!-- ─── FLUXO 3: Solicitação de Acesso Especial (B2B/Admin) ─── -->
    <div id="request-section" class="auth-section">
        <form id="request-form" aria-label="Formulário de Solicitação">
            <p class="text-sm text-muted" style="margin-bottom: 20px;">Ideal para agências ou contas corporativas sob medida.</p>
            <div class="form-group">
                <label for="nome-req">Nome da Empresa / Profissional</label>
                <input type="text" id="nome-req" placeholder="Ex: Lumina Agency" required>
            </div>
            <div class="form-group">
                <label for="email-req">E-mail para Contato</label>
                <input type="email" id="email-req" placeholder="contato@empresa.com" required>
            </div>
            <div class="form-group">
                <label for="motivo-req">Objetivo do Uso</label>
                <textarea id="motivo-req" placeholder="Descreva brevemente sua necessidade..." style="min-height:80px;"></textarea>
            </div>
            <button type="submit" class="btn btn-outline" style="width: 100%; justify-content: center;">
                <span>Enviar Solicitação</span>
            </button>
        </form>
    </div>

    <!-- ─── FLUXO 4: Recuperação de Senha ─── -->
    <div id="recover-section" class="auth-section">
        <form id="recover-form">
            <h3 class="text-sm uppercase" style="margin-bottom: 12px; color: var(--primary);">Recuperar Acesso</h3>
            <p class="text-xs text-muted" style="margin-bottom: 20px;">Enviaremos um link de redefinição para o seu e-mail cadastrado.</p>
            <div class="form-group">
                <label for="email-recover">E-mail Cadastrado</label>
                <input type="email" id="email-recover" placeholder="seu@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <span>Enviar Link</span>
            </button>
            <div class="auth-footer-links">
                <a href="#" onclick="switchAuth('login')">Voltar ao Login</a>
            </div>
        </form>
    </div>

    <!-- Mensagens de Status (Feedback do Servidor) -->
    <div id="auth-status" class="message"></div>

    <footer class="login-footer" style="margin-top: 32px; border-top: 1px solid var(--border); padding-top: 24px;">
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--primary); font-size: 0.7rem; opacity: 0.7;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span class="uppercase">Ambiente Criptografado SSL</span>
        </div>
    </footer>
</div>

<!-- ─── Lógica de Comportamento de Autenticação ─── -->
<script>
    // Alterna a exibição entre as seções de Login, Cadastro, Solicitação e Recuperação
    function switchAuth(type) {
        document.querySelectorAll('.auth-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        
        const section = document.getElementById(`${type}-section`);
        if(section) section.classList.add('active');
        
        const tabs = document.querySelectorAll('.auth-tab');
        if(type === 'login') tabs[0].classList.add('active');
        if(type === 'register') tabs[1].classList.add('active');
        if(type === 'request') tabs[2].classList.add('active');
    }

    // Exibe mensagens de sucesso ou erro para o usuário
    const showMsg = (text, isSuccess) => {
        const msg = document.getElementById('auth-status');
        msg.textContent = text;
        msg.className = `message ${isSuccess ? 'success' : 'error'}`;
        setTimeout(() => msg.className = 'message', 5000);
    };

    // Submissão: Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email-login').value;
        const senha = document.getElementById('senha-login').value;
        
        try {
            const resp = await fetch('http://127.0.0.1:5000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });
            const data = await resp.json();
            if(data.sucesso) {
                window.location.href = 'dashboard.html';
            } else {
                showMsg(data.error || 'Erro ao entrar', false);
            }
        } catch (err) {
            showMsg('Erro de conexão com o servidor', false);
        }
    });

    // Submissão: Cadastro
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nome = document.getElementById('nome-reg').value;
        const email = document.getElementById('email-reg').value;
        const senha = document.getElementById('senha-reg').value;
        
        try {
            const resp = await fetch('http://127.0.0.1:5000/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha })
            });
            const data = await resp.json();
            if(data.sucesso) {
                showMsg('Conta criada! Você já pode entrar.', true);
                setTimeout(() => switchAuth('login'), 2000);
            } else {
                showMsg(data.error || 'Erro ao registrar', false);
            }
        } catch (err) {
            showMsg('Erro de conexão', false);
        }
    });

    // Submissão: Solicitação de Acesso (Administrativo)
    document.getElementById('request-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nome = document.getElementById('nome-req').value;
        const email = document.getElementById('email-req').value;
        const motivo = document.getElementById('motivo-req').value;
        
        try {
            const resp = await fetch('http://127.0.0.1:5000/solicitar-acesso', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, motivo })
            });
            const data = await resp.json();
            if(data.sucesso) {
                showMsg('Solicitação enviada com sucesso!', true);
                e.target.reset();
            } else {
                showMsg(data.error || 'Erro ao enviar', false);
            }
        } catch (err) {
            showMsg('Erro de conexão', false);
        }
    });

    // Submissão: Recuperação de Senha
    document.getElementById('recover-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email-recover').value;
        try {
            const resp = await fetch('http://127.0.0.1:5000/recuperar-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await resp.json();
            if(data.sucesso) {
                showMsg(data.message, true);
            } else {
                showMsg(data.error || 'Erro ao processar', false);
            }
        } catch (err) {
            showMsg('Erro de conexão', false);
        }
    });
</script>
</body>
</html>
