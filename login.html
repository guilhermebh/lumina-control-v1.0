<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lumina Control - Acesse seu painel de resultados">
    <title>Lumina Control | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-split">
        <!-- Lado Imersivo (Imagem) -->
        <div class="login-image-side">
            <div class="login-image-content">
                <h2>O futuro do controle em suas mãos.</h2>
                <p>Acesse o Lumina Control e visualize seus resultados com a precisão e clareza que seu negócio merece.</p>
            </div>
        </div>

        <!-- Lado do Formulário -->
        <div class="login-form-side">
            <div class="login-box">
                <nav class="site-nav">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="login.html" class="active">Cliente</a></li>
                        <li><a href="agendamento.html">Agendamento</a></li>
                        <li><a href="contato.html">Contato</a></li>
                    </ul>
                </nav>

                <div class="logo">
                    <h1>Lumina</h1>
                    <p>Dashboard de Resultados</p>
                </div>

                <form id="login-form" class="minimal-form">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-minimal">Entrar na Plataforma</button>
                </form>

                <div id="mensagem" class="message"></div>

                <div class="divider">Ou continue com</div>

                <div class="social-login">
                    <button type="button" class="social-btn btn-gmail" title="Entrar com Google" onclick="window.location.href='/login/google'">
                        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.27.81-.57z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    </button>
                    <button type="button" class="social-btn btn-yahoo" title="Entrar com Yahoo" onclick="window.location.href='/login/yahoo'">
                        <svg viewBox="0 0 24 24"><path d="M4.14 2H7.2L12 11.45 16.8 2H19.86L13.56 14.1V22H10.44V14.1L4.14 2Z" fill="currentColor"/></svg>
                    </button>
                    <button type="button" class="social-btn btn-outlook" title="Entrar com Outlook/E-mail" onclick="alert('Outlook/Email integration coming soon!')">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://127.0.0.1:5000';
    const form = document.getElementById('login-form');
    const mensagemDiv = document.getElementById('mensagem');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const btn = form.querySelector('.btn-login');

        btn.disabled = true;
        btn.textContent = 'Carregando...';

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha }),
                credentials: 'include'
            });

            const dados = await response.json();

            if (response.ok) {
                mensagemDiv.className = 'message success';
                mensagemDiv.textContent = '✅ Login realizado com sucesso! Redirecionando...';
                setTimeout(() => {
                    window.location.href = 'results.html';
                }, 1500);
            } else {
                mensagemDiv.className = 'message error';
                mensagemDiv.textContent = `❌ ${dados.error || 'Erro no login'}`;
            }
        } catch (error) {
            mensagemDiv.className = 'message error';
            mensagemDiv.textContent = '❌ Erro ao conectar com o servidor';
            console.error('Erro:', error);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    });
</script>

</body>
</html>
