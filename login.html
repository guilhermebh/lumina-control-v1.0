<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lumina Control - Acesse seu painel de resultados">
    <title>Lumina Control | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-split">
        <!-- Lado Imersivo (Imagem Abstrata) -->
        <div class="login-image-side">
            <div class="login-image-content">
                <span class="badge-premium">Inteligência de Dados</span>
                <h2>Sua visão de negócios, <br>agora em alta definição.</h2>
                <p>Minimalismo e precisão para quem decide. Acesse sua plataforma de controle Lumina.</p>
            </div>
        </div>

        <!-- Lado do Formulário -->
        <div class="login-form-side">
            <div class="login-box">
                <header class="login-header">
                    <div class="logo-minimal">
                        <div class="logo-symbol"></div>
                        <h1>Lumina</h1>
                    </div>
                    <p class="login-subtitle">Bem-vindo de volta. Identifique-se para continuar.</p>
                </header>

                <form id="login-form" class="minimal-form">
                    <div class="form-group">
                        <label for="email">E-mail Corporativo</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            <input type="email" id="email" name="email" placeholder="nome@empresa.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label for="senha">Senha de Acesso</label>
                            <a href="#" class="forgot-link">Esqueceu?</a>
                        </div>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-11V7a4 4 0 00-8 0v4h8z"/></svg>
                            <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary-minimal">
                        <span>Acessar Dashboard</span>
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
                    </button>
                </form>

                <div id="mensagem" class="message"></div>

                <div class="divider">
                    <span>Acesso Rápido</span>
                </div>

                <div class="social-login-grid">
                    <button type="button" class="social-item" onclick="window.location.href='/login/google'">
                        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.27.81-.57z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        <span>Google</span>
                    </button>
                    <button type="button" class="social-item" onclick="window.location.href='/login/yahoo'">
                        <svg viewBox="0 0 24 24"><path d="M4.14 2H7.2L12 11.45 16.8 2H19.86L13.56 14.1V22H10.44V14.1L4.14 2Z" fill="#6001d2"/></svg>
                        <span>Yahoo</span>
                    </button>
                </div>

                <footer class="login-box-footer">
                    <p>Novo por aqui? <a href="contato.html">Solicite acesso</a></p>
                    <nav class="footer-nav">
                        <a href="index.html">Início</a>
                        <a href="agendamento.html">Agenda</a>
                    </nav>
                </footer>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://127.0.0.1:5000';
    const form = document.getElementById('login-form');
    const mensagemDiv = document.getElementById('mensagem');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const btn = form.querySelector('.btn-primary-minimal');

        btn.disabled = true;
        const originalText = btn.querySelector('span').textContent;
        btn.querySelector('span').textContent = 'Validando...';

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha }),
                credentials: 'include'
            });

            const dados = await response.json();

            if (response.ok) {
                mensagemDiv.className = 'message success';
                mensagemDiv.textContent = '✅ Autenticação confirmada.';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                mensagemDiv.className = 'message error';
                mensagemDiv.textContent = `❌ ${dados.error || 'Acesso negado'}`;
            }
        } catch (error) {
            mensagemDiv.className = 'message error';
            mensagemDiv.textContent = '❌ Falha de comunicação com o servidor';
            console.error('Erro:', error);
        } finally {
            btn.disabled = false;
            btn.querySelector('span').textContent = originalText;
        }
    });
</script>

</body>
</html>
