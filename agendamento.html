<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lumina Control - Agende sua Consultoria Técnica">
    <title>Lumina Control | Agendamento</title>
    <!-- Importação do Design System Unificado -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="login-wrapper">

<!-- Acessibilidade: Pular para o formulário principal -->
<a href="#form-agendamento" class="skip-link">Pular para o formulário</a>

<!-- Fundos Estilizados -->
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- Caixa de Agendamento Centralizada -->
<div class="login-box reveal visible" style="max-width: 600px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
    <header class="login-header">
        <!-- Logotipo Institucional -->
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 24px;" aria-label="Voltar para Home">
            ◈ LUMINA<span>CONTROL</span>
        </a>
        <h1 style="font-size: var(--fs-h3); letter-spacing: -0.5px;">Agendamento</h1>
        <p class="login-subtitle">Solicite uma consultoria estratégica com nossos especialistas</p>
        
        <!-- Sinal de Confiança (SSL) -->
        <div class="trust-signal" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; color: var(--primary); font-size: var(--fs-xs); opacity: 0.7;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span class="uppercase">Conexão Segura SSL</span>
        </div>
    </header>

    <!-- Formulário de Solicitação de Consultoria -->
    <form id="form-agendamento">
        <!-- Nome -->
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
            </div>
        </div>

        <!-- E-mail -->
        <div class="form-group">
            <label for="email">E-mail Profissional</label>
            <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
        </div>

        <!-- Data e Hora (Lado a Lado) -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div class="form-group">
                <label for="data">Data Desejada</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <input type="date" id="data" name="data" required>
                </div>
            </div>
            <div class="form-group">
                <label for="hora">Horário</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
                    <input type="time" id="hora" name="hora" required>
                </div>
            </div>
        </div>

        <!-- Observações Opcionais -->
        <div class="form-group">
            <label for="observacoes">Notas Adicionais</label>
            <textarea id="observacoes" name="observacoes" placeholder="Alguma observação importante?" style="min-height: 80px;"></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
            <span>Solicitar Consultoria</span>
        </button>
    </form>

    <!-- Exibição de Resposta do Sistema -->
    <div id="mensagem-agendamento" class="message"></div>

    <footer class="login-footer" style="text-align: center; margin-top: 24px;">
        <a href="index.html" class="text-sm">Voltar ao Início</a>
    </footer>
</div>

<script>
    // Gerenciador de Envio do Agendamento
    document.getElementById('form-agendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const msg = document.getElementById('mensagem-agendamento');
        msg.textContent = 'SOLICITAÇÃO RECEBIDA. NOSSA EQUIPE ENTRARÁ EM CONTATO.';
        msg.className = 'message success';
        this.reset();
        setTimeout(() => { msg.className = 'message'; }, 5000);
    });
</script>
</body>
</html>
