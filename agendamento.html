<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lumina Control - Agende uma consultoria com nossa equipe">
    <title>Lumina Control | Agendamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="premium-page" style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=2070');">
    <nav class="site-nav" style="position: absolute; top: 30px; z-index: 10;">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Cliente</a></li>
            <li><a href="agendamento.html" class="active">Agendamento</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <div class="premium-card">
        <div class="premium-header">
            <h2>Agendar Consultoria</h2>
            <p>Escolha o melhor momento para otimizarmos seus resultados.</p>
        </div>

        <form id="form-agendamento" class="minimal-form">
            <div class="form-group">
                <label for="nome">Seu Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Nome completo" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail Profissional</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-row" style="display: flex; gap: 20px;">
                <div class="form-group" style="flex:1;">
                    <label for="data">Data</label>
                    <input type="date" id="data" name="data" required>
                </div>
                <div class="form-group" style="flex:1;">
                    <label for="hora">Horário</label>
                    <input type="time" id="hora" name="hora" required>
                </div>
            </div>
            <div class="form-group">
                <label for="observacoes">Notas Adicionais</label>
                <textarea rows="2" id="observacoes" name="observacoes" placeholder="Algo que gostaria de antecipar?"></textarea>
            </div>
            <button type="submit" class="btn-minimal">Confirmar Agendamento</button>
        </form>

        <div id="mensagem-agendamento" class="status-msg"></div>
    </div>
</div>

<script>
    document.getElementById('form-agendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const msg = document.getElementById('mensagem-agendamento');
        msg.textContent = '✅ Agendamento enviado com sucesso! Entraremos em contato em breve.';
        msg.className = 'status-msg show success';
        this.reset();
        setTimeout(() => { msg.className = 'status-msg'; }, 5000);
    });
</script>
</body>
</html>
