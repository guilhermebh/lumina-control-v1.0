<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lumina Control - Agende uma consultoria com nossa equipe">
    <title>Lumina Control | Agendamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <nav class="site-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Cliente</a></li>
            <li><a href="agendamento.html" class="active">Agendamento</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <div class="form-card" style="margin-top: 0;">
        <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Agendamento de Consultoria</h2>
        <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 0.92rem;">Preencha os dados abaixo para agendar uma reunião com nossa equipe.</p>

        <form id="form-agendamento">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:1;">
                    <label for="data">Data desejada</label>
                    <input type="date" id="data" name="data" required>
                </div>
                <div class="form-group" style="flex:1;">
                    <label for="hora">Hora</label>
                    <input type="time" id="hora" name="hora" required>
                </div>
            </div>
            <div class="form-group">
                <label for="observacoes">Observações</label>
                <textarea rows="4" id="observacoes" name="observacoes" placeholder="Informações adicionais (opcional)..."></textarea>
            </div>
            <button type="submit" class="btn-submit">Enviar Agendamento</button>
        </form>

        <div id="mensagem-agendamento" class="status-msg"></div>
    </div>
</div>

<script>
    document.getElementById('form-agendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const msg = document.getElementById('mensagem-agendamento');
        msg.textContent = '✅ Agendamento enviado com sucesso! Entraremos em contato em breve.';
        msg.className = 'status-msg show success';
        this.reset();
        setTimeout(() => { msg.className = 'status-msg'; }, 5000);
    });
</script>
</body>
</html>
